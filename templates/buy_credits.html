<div class="container mt-4">
    <h3>💳 Payment Details</h3>
    <p>UPI ID: <b>yourname@upi</b></p>
    <p>Scan QR code above (if added) and pay.</p>
    
    <hr>
    
    <h5>Submit Transaction Details</h5>
    <form action="{{ url_for('submit_payment') }}" method="POST">
        <input type="number" name="amount" class="form-control mb-2" placeholder="Amount Paid" required>
        <input type="text" name="trx_id" class="form-control mb-2" placeholder="Transaction ID (UTR Number)" required>
        <button type="submit" class="btn btn-success">Send Request</button>
    </form>
</div>
