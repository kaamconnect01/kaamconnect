{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-sm-12">
        <div class="card shadow border-0 p-4">
            <h2 class="text-center fw-bold text-primary mb-4">Portal Entry</h2>
            
            <!-- Main Navigation Tabs -->
            <ul class="nav nav-pills justify-content-center mb-4" id="authTabs" role="tablist">
                <li class="nav-item">
                    <button class="nav-link active" id="login-tab" data-bs-toggle="pill" data-bs-target="#loginSection">Login</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="signup-tab" data-bs-toggle="pill" data-bs-target="#signupSection">Register / Signup</button>
                </li>
            </ul>

            <div class="tab-content">
                <!-- ================= LOGIN FORM ================= -->
                <div class="tab-pane fade show active" id="loginSection">
                    <form action="{{ url_for('signup_login') }}" method="POST">
                        <input type="hidden" name="action" value="login">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Mobile Number</label>
                            <input type="text" name="mobile" class="form-control form-control-lg" placeholder="Enter Mobile Number" required>
                            <small class="text-muted">Note: Customers can enter just their mobile number to log in directly if already registered.</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Password</label>
                            <input type="password" name="password" class="form-control form-control-lg" placeholder="Password (Leave blank for Customer)">
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm mt-3">Access Portal</button>
                    </form>
                </div>

                <!-- ================= SIGNUP FORM SECTIONS ================= -->
                <div class="tab-pane fade" id="signupSection">
                    <p class="text-center text-muted small">Apna sahi Role select karke profile create karein:</p>
                    
                    <!-- Role Pill Selection inside Signup -->
                    <ul class="nav nav-tabs justify-content-center mb-3" id="roleTabs">
                        <li class="nav-item">
                            <button class="nav-link active small" data-bs-toggle="tab" data-bs-target="#custRole">Customer</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link small" data-bs-toggle="tab" data-bs-target="#shopRole">Shop Owner</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link small" data-bs-toggle="tab" data-bs-target="#workerRole">Worker</button>
                        </li>
                    </ul>

                    <div class="tab-content border p-3 rounded bg-light">
                        <!-- Customer Instant Signup -->
                        <div class="tab-pane fade show active" id="custRole">
                            <form action="{{ url_for('signup_login') }}" method="POST">
                                <input type="hidden" name="action" value="signup_customer">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Mobile Number</label>
                                    <input type="text" name="mobile" class="form-control" placeholder="Enter Mobile for instant registration" required>
                                </div>
                                <button type="submit" class="btn btn-success w-100">Instant Customer Login</button>
                            </form>
                        </div>

                        <!-- Shop Owner Detailed Signup -->
                        <div class="tab-pane fade" id="shopRole">
                            <form action="{{ url_for('signup_login') }}" method="POST">
                                <input type="hidden" name="action" value="signup_shop">
                                <div class="mb-2"><label class="small fw-bold">Shop/Owner Name</label><input type="text" name="name" class="form-control form-control-sm" required></div>
                                <div class="mb-2"><label class="small fw-bold">Mobile</label><input type="text" name="mobile" class="form-control form-control-sm" required></div>
                                <div class="mb-2"><label class="small fw-bold">Email</label><input type="email" name="email" class="form-control form-control-sm"></div>
                                <div class="mb-2"><label class="small fw-bold">Address</label><input type="text" name="address" class="form-control form-control-sm" required></div>
                                <div class="row">
                                    <div class="col"><div class="mb-2"><label class="small fw-bold">Experience (Yrs/Months)</label><input type="text" name="experience" class="form-control form-control-sm" placeholder="e.g. 5 Years"></div></div>
                                    <div class="col"><div class="mb-2"><label class="small fw-bold">Expertise</label><input type="text" name="expertise" class="form-control form-control-sm" placeholder="e.g. Modular Kitchen"></div></div>
                                </div>
                                <div class="mb-3"><label class="small fw-bold">Password</label><input type="password" name="password" class="form-control form-control-sm" required></div>
                                <button type="submit" class="btn btn-primary w-100 btn-sm">Create Shop Profile</button>
                            </form>
                        </div>

                        <!-- Worker Detailed Signup -->
                        <div class="tab-pane fade" id="workerRole">
                            <form action="{{ url_for('signup_login') }}" method="POST">
                                <input type="hidden" name="action" value="signup_worker">
                                <div class="mb-2"><label class="small fw-bold">Worker Full Name</label><input type="text" name="name" class="form-control form-control-sm" required></div>
                                <div class="mb-2"><label class="small fw-bold">Mobile</label><input type="text" name="mobile" class="form-control form-control-sm" required></div>
                                <div class="mb-2"><label class="small fw-bold">Email</label><input type="email" name="email" class="form-control form-control-sm"></div>
                                <div class="mb-2"><label class="small fw-bold">Address</label><input type="text" name="address" class="form-control form-control-sm" required></div>
                                <div class="mb-2"><label class="small fw-bold">Expertise Details</label><input type="text" name="expertise" class="form-control form-control-sm" placeholder="e.g. Sofa structure, Polish" required></div>
                                <div class="row">
                                    <div class="col"><div class="mb-2"><label class="small fw-bold">Experience</label><input type="text" name="experience" class="form-control form-control-sm" placeholder="e.g. 2 Years"></div></div>
                                    <div class="col"><div class="mb-2"><label class="small fw-bold">Per Day Salary (Rs)</label><input type="number" name="last_job_amount" class="form-control form-control-sm" placeholder="e.g. 700" required></div></div>
                                </div>
                                <div class="mb-3"><label class="small fw-bold">Password</label><input type="password" name="password" class="form-control form-control-sm" required></div>
                                <button type="submit" class="btn btn-warning w-100 btn-sm">Register as Worker</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
