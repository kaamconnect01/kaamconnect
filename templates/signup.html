{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6 col-sm-12">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0 text-center">Signup as {{ role.replace('_', ' ').title() }}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <!-- Sabke liye mandatory -->
                    <div class="mb-3">
                        <label>Mobile Number</label>
                        <input type="text" name="mobile" class="form-control" required placeholder="10 Digit Number">
                    </div>
                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <!-- Agar user Customer nahi hai, tabhi ye details pucho -->
                    {% if role != 'customer' %}
                        <div class="mb-3">
                            <label>Full Name</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Email ID</label>
                            <input type="email" name="email" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label>Full Address</label>
                            <textarea name="address" class="form-control" rows="2" required></textarea>
                        </div>
                        <div class="row mb-3">
                            <div class="col-6">
                                <label>Experience (Years)</label>
                                <input type="text" name="experience" class="form-control" required>
                            </div>
                            <div class="col-6">
                                <label>Expertise</label>
                                <input type="text" name="expertise" class="form-control" placeholder="e.g. Sofa, Bed" required>
                            </div>
                        </div>
                    {% endif %}

                    <!-- Agar user Worker hai toh per day amount pucho -->
                    {% if role == 'worker' %}
                        <div class="mb-3">
                            <label>Last Job Per Day Amount (₹)</label>
                            <input type="number" name="per_day_amount" class="form-control" required>
                        </div>
                    {% endif %}

                    <button type="submit" class="btn btn-primary w-100 mt-2">Create Account</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
